services:
  postgres:
    image: postgres:16-alpine
    container_name: maradentro_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - maradentro_network

volumes:
  postgres_data:

networks:
  maradentro_network:
    driver: bridge
